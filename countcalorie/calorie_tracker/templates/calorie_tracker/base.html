<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Calorie Counter{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#ecfdf5',
                            100: '#d1fae5',
                            500: '#10b981',
                            600: '#059669',
                            700: '#047857',
                        }
                    }
                }
            }
        }
    </script>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gradient-to-br from-emerald-50 via-white to-teal-50 min-h-screen">
    <nav class="bg-white shadow-sm border-b border-emerald-100">
        <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="{% url 'index' %}" class="flex items-center gap-2 text-emerald-700 font-bold text-xl">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>
                Calorie Counter
            </a>
            <span class="text-sm text-gray-500 hidden sm:inline">Track your daily nutrition</span>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-8">
        {% if messages %}
            <div class="mb-6 space-y-2">
                {% for message in messages %}
                    <div class="px-4 py-3 rounded-lg text-sm font-medium
                        {% if message.tags == 'success' %}bg-emerald-100 text-emerald-800 border border-emerald-200
                        {% elif message.tags == 'error' %}bg-red-100 text-red-800 border border-red-200
                        {% else %}bg-blue-100 text-blue-800 border border-blue-200{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <footer class="text-center text-gray-400 text-sm py-6">
        <p>Calorie Counter &mdash; Built with Django &amp; Tailwind CSS</p>
    </footer>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
